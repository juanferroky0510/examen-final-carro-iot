<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Parámetros</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-expand-lg bg-dark shadow">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="index.html">
                🚗 Carrito IoT
            </a>

        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card shadow-lg border-0">

                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">
                            ⚙ Configuración de Parámetros
                        </h3>
                    </div>

                    <div class="card-body">

                        <!-- FORMULARIO -->
                        <form id="formParametros">

                            <!-- RADIOBUTTONS -->
                            <div class="mb-4">

                                <label class="form-label fw-bold">
                                    Selecciona un parámetro:
                                </label>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="clave" value="VELOCIDAD" checked>

                                    <label class="form-check-label">
                                        VELOCIDAD
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="clave" value="FACTOR_VUELTA">

                                    <label class="form-check-label">
                                        FACTOR_VUELTA
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="clave" value="FACTOR_TIEMPO">

                                    <label class="form-check-label">
                                        FACTOR_TIEMPO
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="clave" value="FACTOR_GIRO_90">

                                    <label class="form-check-label">
                                        FACTOR_GIRO_90
                                    </label>
                                </div>

                            </div>

                            <!-- VALOR -->
                            <div class="mb-4">

                                <label class="form-label fw-bold">
                                    Valor:
                                </label>

                                <input type="number" class="form-control form-control-lg" id="valor" step="0.01"
                                    placeholder="Ingrese un valor">

                            </div>

                            <!-- BOTÓN -->
                            <button type="submit" class="btn btn-success w-100 py-3 fw-bold">

                                💾 Guardar Parámetro

                            </button>

                            <a href="index.html" class="btn btn-secondary w-100 py-3 fw-bold">
                                ⬅ Regresar al Control
                            </a>

                        </form>

                        <!-- MENSAJE -->
                        <div id="mensaje" class="mt-4 text-center fw-bold">
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">
            Desarrollado por Juan Fernando Ortega Olvera | Sistema IoT ESP8266 + AWS + WebSocket
        </p>
    </footer>

    <!-- JS -->
    <script src="assets/js/parametros.js"></script>

</body>

</html>
