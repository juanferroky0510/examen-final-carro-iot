<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Carrito IoT</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-expand-lg bg-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                🚗 Carrito IoT ESP8266
            </a>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="container-fluid mt-4">

        <div class="row">

            <!-- PANEL CONTROL -->
            <div class="col-lg-6 mb-4">

                <div class="card shadow-lg border-0 h-100">

                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Control del Carrito</h4>
                    </div>

                    <div class="card-body">

                        <div class="control-grid">

                            <button class="btn btn-success control-btn" onclick="enviarMovimiento(1)">
                                ⬆ Adelante
                            </button>

                            <button class="btn btn-danger control-btn" onclick="enviarMovimiento(2)">
                                ⬇ Retroceder
                            </button>

                            <button class="btn btn-warning control-btn" onclick="enviarMovimiento(5)">
                                ↖ Vuelta Adelante Izquierda
                            </button>

                            <button class="btn btn-warning control-btn" onclick="enviarMovimiento(4)">
                                ↗ Vuelta Adelante Derecha
                            </button>

                            <button class="btn btn-secondary control-btn" onclick="enviarMovimiento(7)">
                                ↙ Vuelta Atrás Izquierda
                            </button>

                            <button class="btn btn-secondary control-btn" onclick="enviarMovimiento(6)">
                                ↘ Vuelta Atrás Derecha
                            </button>

                            <button class="btn btn-info control-btn" onclick="enviarMovimiento(8)">
                                ↪ 90° Derecha
                            </button>

                            <button class="btn btn-info control-btn" onclick="enviarMovimiento(9)">
                                ↩ 90° Izquierda
                            </button>

                            <button class="btn btn-dark control-btn" onclick="enviarMovimiento(10)">
                                🔄 360° Derecha
                            </button>

                            <button class="btn btn-dark control-btn" onclick="enviarMovimiento(11)">
                                🔄 360° Izquierda
                            </button>

                            <button class="btn btn-danger control-btn stop-btn" onclick="enviarMovimiento(3)">
                                🛑 DETENER
                            </button>

                        </div>

                    </div>
                    <div class="mt-4">
                        <button class="btn btn-outline-primary w-100 py-3 fw-bold" onclick="irAParametros()">
                            ⚙ Configurar Parámetros
                        </button>
                    </div>
                </div>
            </div>

            <!-- DASHBOARD -->
            <div class="col-lg-6 mb-4">

                <div class="card shadow-lg border-0 h-100">

                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0">Dashboard WebSocket</h4>
                    </div>

                    <div class="card-body">

                        <div class="mb-3">
                            <span class="badge bg-success" id="estadoWS">
                                Conectando...
                            </span>
                        </div>

                        <div id="dashboard" class="dashboard-container">

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 mt-4">
        <p class="mb-0">
            Desarrollado por JuanFer | Sistema IoT ESP8266 + AWS + WebSocket
        </p>
    </footer>

    <!-- JS -->
    <script src="assets/js/app.js"></script>

</body>

</html>
